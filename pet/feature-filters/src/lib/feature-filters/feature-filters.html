<form [formGroup]="form" *transloco="let t">
  <lib-ch-ui-active-filters
    testId="active-filters"
    [values]="activeFilters"
    (resetFilter)="resetFilter($event)"
  >
  </lib-ch-ui-active-filters>

  @for (config of filterConfigs(); track config.key) { @if (config.type ===
  'input') {
  <lib-ch-ui-input-filter
    [testId]="'filter-' + config.key + '-input'"
    [title]="t(config.key)"
    [formControlName]="config.key"
  ></lib-ch-ui-input-filter>
  } @if (config.type === 'radio') {
  <lib-ch-ui-radio-filter
    [testId]="'filter-' + config.key + '-radio'"
    [title]="t(config.key)"
    [options]="config.options"
    [formControlName]="config.key"
  ></lib-ch-ui-radio-filter>
  } }
</form>
