<div *transloco="let t">
  <lib-ch-ui-active-filters
    testId="active-filters"
    [values]="activeFilters"
    (resetFilter)="resetFilter($event)"
  >
  </lib-ch-ui-active-filters>

  <lib-ch-ui-input-filter
    testId="filter-name_like-input"
    [title]="t('name_like')"
    [formField]="filtersForm.name_like"
  ></lib-ch-ui-input-filter>

  <lib-ch-ui-radio-filter
    testId="filter-kind-radio"
    [title]="t('kind')"
    [options]="filterConfigs().kindOptions"
    [formField]="filtersForm.kind"
  ></lib-ch-ui-radio-filter>
</div>
