<div *transloco="let t">
  <lib-ch-ui-active-filters
    testId="active-filters"
    [values]="store.filters()"
    (resetFilter)="resetFilter($event)"
  >
  </lib-ch-ui-active-filters>

  @for (config of filterConfigs(); track config.key) {
    @switch (config.type) {
      @case ('input') {
        <lib-ch-ui-input-filter
          [testId]="'filter-' + config.key + '-input'"
          [title]="t(config.key)"
          [formField]="$any(formTree)[config.key]"
        ></lib-ch-ui-input-filter>
      }
      @case ('radio') {
        <lib-ch-ui-radio-filter
          [testId]="'filter-' + config.key + '-radio'"
          [title]="t(config.key)"
          [options]="config.options ?? []"
          [formField]="$any(formTree)[config.key]"
        ></lib-ch-ui-radio-filter>
      }
    }
  }

  @if (!autoApply()) {
    <div class="mt-6">
      <lib-ch-ui-button fullWidth (clicked)="manualApply()">
        {{ t('applyFilters') }}
      </lib-ch-ui-button>
    </div>
  }
</div>
