<ng-container *transloco="let t">
  <lib-ch-ui-product-list-header
    [text]="t('pets')"
    [showFilters]="showFilters()"
    (toggleFilters)="toggleFilters()"
  >
    <lib-ch-ui-dropdown-filter
      testId="product-sort-dropdown"
      [options]="[
        { key: 'id', order: 'asc', text: t('sort.mostPopular') },
        { key: 'name', order: 'asc', text: t('sort.nameAsc') },
        { key: 'name', order: 'desc', text: t('sort.nameDesc') },
        { key: 'weight', order: 'asc', text: t('sort.weightAsc') },
        { key: 'weight', order: 'desc', text: t('sort.weightDesc') },
        { key: 'height', order: 'asc', text: t('sort.heightAsc') },
        { key: 'height', order: 'desc', text: t('sort.heightDesc') },
        { key: 'length', order: 'asc', text: t('sort.lengthAsc') },
        { key: 'length', order: 'desc', text: t('sort.lengthDesc') }
      ]"
      (sortbyChange)="sortBy($event)"
    >
    </lib-ch-ui-dropdown-filter>
  </lib-ch-ui-product-list-header>
</ng-container>

<section aria-labelledby="products-heading" class="chars">
  <div class="chars__grid">
    <lib-feature-filters
      class="chars__filters"
      [class.chars__filters--hidden]="!showFilters()"
      [filters]="{ name_like: name_like(), kind: kind() }"
      (filterChange)="handleFilterChange($event)"
      (filterReset)="handleFilterReset($event)"
    ></lib-feature-filters>

    <lib-feature-pet-list
      class="chars__list"
      [class.chars__list--no-filters]="!showFilters()"
      [showFilters]="showFilters()"
      (pageChange)="handlePageChange($event)"
    ></lib-feature-pet-list>
  </div>
</section>
<lib-feature-pet-of-day></lib-feature-pet-of-day>
