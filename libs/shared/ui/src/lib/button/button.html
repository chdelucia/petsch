<button
  type="button"
  [disabled]="disabled()"
  class="btn"
  [ngClass]="{
        'btn--primary': variant() === 'primary',
        'btn--link': variant() === 'link',
        'btn--full-width': fullWidth(),
        'btn--disabled': disabled()
      }"
  (click)="handleClick()"
>
  <ng-content></ng-content>
</button>
