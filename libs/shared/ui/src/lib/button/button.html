<button
  type="button"
  [disabled]="disabled()"
  class="ch-btn"
  [ngClass]="{
        'ch-btn--primary': variant() === 'primary',
        'ch-btn--link': variant() === 'link',
        'ch-btn--full-width': fullWidth(),
        'ch-btn--disabled': disabled()
      }"
  (click)="handleClick()"
  [attr.data-testid]="testId()"
>
  <ng-content></ng-content>
</button>
