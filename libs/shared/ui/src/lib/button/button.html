<button
  type="button"
  [disabled]="disabled()"
  class="ch-btn"
  [ngClass]="{
    'ch-btn--primary': variant() === 'primary',
    'ch-btn--secondary': variant() === 'secondary',
    'ch-btn--outline': variant() === 'outline',
    'ch-btn--ghost': variant() === 'ghost',
    'ch-btn--link': variant() === 'link',
    'ch-btn--sm': size() === 'sm',
    'ch-btn--md': size() === 'md',
    'ch-btn--lg': size() === 'lg',
    'ch-btn--full-width': fullWidth(),
    'ch-btn--disabled': disabled(),
    'ch-btn--active': isActive()
  }"
  (click)="handleClick($event)"
  [attr.data-testid]="testId()"
  [attr.aria-label]="ariaLabel() || null"
  [attr.aria-expanded]="ariaExpanded() === undefined ? null : ariaExpanded()"
  [attr.aria-controls]="ariaControls() || null"
  [attr.aria-haspopup]="ariaHasPopup() || null"
>
  <ng-content></ng-content>
</button>
