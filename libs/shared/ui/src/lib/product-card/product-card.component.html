<div class="product-card"  data-cy="product-card">
  <div class="product-card__img-container">
    <img
      [src]="imageUrl()"
      [alt]="name()"
      [style.viewTransitionName]="viewTransitionName()"
      class="product-card__img"
    />
  </div>
  <div class="product-card__info">
    <div class="product-card__details">
      <h3 class="product-card__title">
        <a [routerLink]="['/products/details', id()]">
          <span aria-hidden="true" class="product-card__link-overlay"></span>
          {{ name() }}
        </a>
      </h3>
      <div class="product-card__meta">
        <span data-cy="product-category">Category: {{ categoryName() }}</span>
      </div>
    </div>
  </div>
</div>
<lib-ui-button [fullWidth]="true">Add as 'Pet of the day'</lib-ui-button>
