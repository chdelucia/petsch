@let selected = sortby();

<div class="dropdown">
  <div *transloco="let t">
    <lib-ch-ui-button
      variant="ghost"
      size="sm"
      (clicked)="toggle()"
      [testId]="testId() + '-button'"
      [ariaExpanded]="isOpen()"
      ariaHasPopup="listbox"
      [ariaControls]="testId() + '-listbox'"
    >
      {{ t('sortLabel') }}: {{ selected.text }}
      <svg
        [class.open]="isOpen()"
        class="dropdown-icon"
        viewBox="0 0 20 20"
        fill="currentColor"
      >
        <path
          fill-rule="evenodd"
          d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"
          clip-rule="evenodd"
        />
      </svg>
    </lib-ch-ui-button>
  </div>

  <div [class.hidden]="!isOpen()" class="dropdown-menu">
    <div
      class="dropdown-list"
      role="listbox"
      [id]="testId() + '-listbox'"
    >
      @for (item of options(); track $index) {
        <span
          tabindex="0"
          role="option"
          [attr.aria-selected]="
            item.key === selected.key && item.order === selected.order
          "
          class="dropdown-item"
          [class.selected]="
            item.key === selected.key && item.order === selected.order
          "
          (click)="emitValue(item)"
          (keydown.enter)="emitValue(item)"
          (keydown.space)="$event.preventDefault(); emitValue(item)"
          [attr.data-testid]="
            testId() + '-option-' + item.key + '-' + item.order
          "
        >
          {{ item.text }}
        </span>
      }
    </div>
  </div>
</div>
