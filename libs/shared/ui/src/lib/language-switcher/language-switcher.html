<section class="lang-switcher">
  @for (language of languages(); track language.code) {
  <lib-ch-ui-button
    variant="ghost"
    size="sm"
    [isActive]="selected() === language.code"
    (clicked)="selectLanguage(language.code)"
  >
    {{ language.label }}
  </lib-ch-ui-button>
  }
</section>
