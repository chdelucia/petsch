<section class="lang-switcher">
  @for (language of languages(); track language.code) {
  <button
    type="button"
    class="lang-switcher__button"
    [class.lang-switcher__button--active]="selected() === language.code"
    [attr.aria-current]="selected() === language.code ? 'page' : null"
    (click)="selectLanguage(language.code)"
  >
    {{ language.label }}
  </button>
  }
</section>
