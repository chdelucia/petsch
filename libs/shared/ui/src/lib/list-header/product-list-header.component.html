<section class="ch-top-container" *transloco="let t">
  <div class="ch-top-container__title">{{ text() }}</div>

  <div class="ch-top-container__filters">
    <ng-content select="lib-ch-ui-dropdown-filter"></ng-content>
    <button
      [title]="t('toggleFilters')"
      class="ch-top-container__filters__btn ch-top-container__filters__btn--mobile"
      (click)="toggleFilters.emit()"
    >
      <span class="ch-top-container__filters__sr">{{ t('filters') }}</span>
      <svg
        class="ch-top-container__filters__togglefilters"
        [class.ch-active]="showFilters()"
        aria-hidden="true"
        viewBox="0 0 20 20"
        fill="currentColor"
      >
        <path
          fill-rule="evenodd"
          d="M2.628 1.601C5.028 1.206 7.49 1 10 1s4.973.206 7.372.601a.75.75 0 01.628.74v2.288a2.25 2.25 0 01-.659 1.59l-4.682 4.683a2.25 2.25 0 00-.659 1.59v3.037c0 .684-.31 1.33-.844 1.757l-1.937 1.55A.75.75 0 018 18.25v-5.757a2.25 2.25 0 00-.659-1.591L2.659 6.22A2.25 2.25 0 012 4.629V2.34a.75.75 0 01.628-.74z"
          clip-rule="evenodd"
        />
      </svg>
    </button>
  </div>
</section>
