<div class="border-b border-gray-200 py-6 relative">
  <h3 class="my-3 flow-root">
    <button
      (click)="togleFilter()"
      (keypress)="togleFilter()"
      type="button"
      class="flex w-full items-center justify-between bg-white py-3 text-sm text-gray-400 hover:text-indigo-600 cursor-pointer"
      aria-controls="filter-section-0"
      [attr.aria-expanded]="isfilterOpen()"
    >
      <span class="font-medium text-gray-900"> {{ title() | uppercase }}</span>
      <span class="ml-6 flex items-center">
        <svg
          class="h-5 w-5"
          [class.hidden]="isfilterOpen()"
          viewBox="0 0 20 20"
          fill="currentColor"
          aria-hidden="true"
        >
          <path
            d="M10.75 4.75a.75.75 0 00-1.5 0v4.5h-4.5a.75.75 0 000 1.5h4.5v4.5a.75.75 0 001.5 0v-4.5h4.5a.75.75 0 000-1.5h-4.5v-4.5z"
          />
        </svg>

        <svg
          class="h-5 w-5"
          [class.hidden]="!isfilterOpen()"
          viewBox="0 0 20 20"
          fill="currentColor"
          aria-hidden="true"
        >
          <path
            fill-rule="evenodd"
            d="M4 10a.75.75 0 01.75-.75h10.5a.75.75 0 010 1.5H4.75A.75.75 0 014 10z"
            clip-rule="evenodd"
          />
        </svg>
      </span>
    </button>
  </h3>

  <div class="relative rounded-md shadow-sm" [class.hidden]="!isfilterOpen()">
    <div
      class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none"
    >
      <svg
        class="w-4 h-4 text-gray-500 dark:text-gray-400"
        aria-hidden="true"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 20 20"
      >
        <path
          stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"
        />
      </svg>
    </div>
    <input
      (input)="getValue($event)"
      (focus)="openLastsearch()"
      (click)="openLastsearch()"
      autocomplete="off"
      [value]="value()"
      name="price"
      type="text"
      data-cy="input-filter-field"
      class="block w-full rounded-md border-0 py-1.5 pl-9 pr text-gray-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6"
      placeholder="Search by name"
    />
  </div>

  @if (lastSearch().length) {
    <div
      class="last-searches flex flex-col gap-2 py-2 rounded-b-md shadow-sm border-x-2 border-b-2 text-sm leading-6"
      [class.hidden]="!isLastSearchOpen()"
    >
      <small class="text-center">Last searches</small>
      @for (item of lastSearch() | slice: 0 : 3; track item) {
        <div class="flex justify-between px-2 cursor-pointer">
          <lib-ui-button
            variant="link"
            (click)="searchByOldValue(item)"
            (keydown)="searchByOldValue(item)"
            class="w-11/12 hover:text-indigo-600 hover:font-bold"
          >
            {{ item }}
          </lib-ui-button>
          <button
            type="button"
            class="text-gray-400 hover:text-indigo-600 hover:font-bold"
            (click)="removeSearch($index, $event)"
          >
            <span class="sr-only">Close</span>
            <svg
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>
      }
    </div>
  }
</div>
