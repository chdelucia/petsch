<div class="border-b border-gray-200 py-6">
  <h3 class="-my-3 flow-root">
    <button
      (click)="togleFilter()"
      type="button"
      class="flex w-full items-center justify-between bg-white py-3 text-sm text-gray-400 hover:text-indigo-600 cursor-pointer"
      aria-controls="filter-section-0"
      aria-expanded="false"
    >
      <span class="font-medium text-gray-900"> {{ title() | uppercase }}</span>
      <span class="ml-6 flex items-center">
        <svg
          class="h-5 w-5"
          [class.hidden]="isOpen()"
          viewBox="0 0 20 20"
          fill="currentColor"
          aria-hidden="true"
        >
          <path
            d="M10.75 4.75a.75.75 0 00-1.5 0v4.5h-4.5a.75.75 0 000 1.5h4.5v4.5a.75.75 0 001.5 0v-4.5h4.5a.75.75 0 000-1.5h-4.5v-4.5z"
          />
        </svg>

        <svg
          class="h-5 w-5"
          [class.hidden]="!isOpen()"
          viewBox="0 0 20 20"
          fill="currentColor"
          aria-hidden="true"
        >
          <path
            fill-rule="evenodd"
            d="M4 10a.75.75 0 01.75-.75h10.5a.75.75 0 010 1.5H4.75A.75.75 0 014 10z"
            clip-rule="evenodd"
          />
        </svg>
      </span>
    </button>
  </h3>

  <div class="pt-6" id="filter-section-0" [class.hidden]="!isOpen()">
    <div class="space-y-4">
      @for (item of options(); track $index) {
        <div class="flex items-center hover:cursor-pointe">
          <input
            (click)="getValue($event)"
            (keydown)="getValue($event)"
            [checked]="item.value === value()"
            [id]="title() + $index"
            [name]="title()"
            [value]="item.value"
            type="radio"
            class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500 hover:cursor-pointer accent-indigo-600"
          />
          <label
            [for]="title() + $index"
            class="ml-3 text-sm text-gray-600 hover:cursor-pointer hover:text-indigo-600 hover:font-bold"
            >{{ item.text }}</label
          >
        </div>
      }
    </div>
  </div>
</div>
