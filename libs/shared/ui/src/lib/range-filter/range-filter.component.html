<div class="ch-range-filter" *transloco="let t">
  <h3 class="ch-range-filter__header">
    <button
      (click)="toggleFilter()"
      type="button"
      class="ch-range-filter__button"
      [attr.aria-expanded]="isOpen()"
    >
      <span class="ch-range-filter__title">{{ t(title()) | uppercase }}</span>
      <span class="ch-range-filter__icon-container">
        <svg
          class="ch-range-filter__icon"
          [class.hidden]="isOpen()"
          viewBox="0 0 20 20"
          fill="currentColor"
          aria-hidden="true"
        >
          <path
            d="M10.75 4.75a.75.75 0 00-1.5 0v4.5h-4.5a.75.75 0 000 1.5h4.5v4.5a.75.75 0 001.5 0v-4.5h4.5a.75.75 0 000-1.5h-4.5v-4.5z"
          />
        </svg>

        <svg
          class="ch-range-filter__icon"
          [class.hidden]="!isOpen()"
          viewBox="0 0 20 20"
          fill="currentColor"
          aria-hidden="true"
        >
          <path
            fill-rule="evenodd"
            d="M4 10a.75.75 0 01.75-.75h10.5a.75.75 0 010 1.5H4.75A.75.75 0 014 10z"
            clip-rule="evenodd"
          />
        </svg>
      </span>
    </button>
  </h3>

  <div class="ch-range-filter__content" [class.hidden]="!isOpen()">
    <div class="ch-range-filter__container">
      <div class="ch-range-filter__value-display">
        <span class="ch-range-filter__current-value">
          {{ value() ?? min() }}
        </span>
      </div>
      <input
        [id]="testId()"
        type="range"
        [min]="min()"
        [max]="max()"
        [step]="step()"
        [value]="value() ?? min()"
        (input)="updateValue($event)"
        (blur)="onTouched()"
        class="ch-range-filter__slider"
        [attr.data-testid]="testId()"
      />
      <div class="ch-range-filter__range-labels">
        <span>{{ min() }}</span>
        <span>{{ max() }}</span>
      </div>
    </div>
  </div>
</div>
