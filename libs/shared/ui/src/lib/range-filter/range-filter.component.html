<div class="ch-range-filter" *transloco="let t">
  <h3 class="ch-range-filter__header">
    <button
      (click)="toggleFilter()"
      type="button"
      class="ch-range-filter__button"
      [attr.aria-expanded]="isOpen()"
    >
      <span class="ch-range-filter__title">{{ t(title()) | uppercase }}</span>
      <span class="ch-range-filter__icon-container">
        <svg
          class="ch-range-filter__icon"
          [class.hidden]="isOpen()"
          viewBox="0 0 20 20"
          fill="currentColor"
          aria-hidden="true"
        >
          <path
            d="M10.75 4.75a.75.75 0 00-1.5 0v4.5h-4.5a.75.75 0 000 1.5h4.5v4.5a.75.75 0 001.5 0v-4.5h4.5a.75.75 0 000-1.5h-4.5v-4.5z"
          />
        </svg>

        <svg
          class="ch-range-filter__icon"
          [class.hidden]="!isOpen()"
          viewBox="0 0 20 20"
          fill="currentColor"
          aria-hidden="true"
        >
          <path
            fill-rule="evenodd"
            d="M4 10a.75.75 0 01.75-.75h10.5a.75.75 0 010 1.5H4.75A.75.75 0 014 10z"
            clip-rule="evenodd"
          />
        </svg>
      </span>
    </button>
  </h3>

  <div class="ch-range-filter__content" [class.hidden]="!isOpen()">
    <div class="ch-range-filter__inputs">
      <div class="ch-range-filter__field">
        <label [for]="testId() + '-min'" class="ch-range-filter__label">{{
          t('min')
        }}</label>
        <input
          [id]="testId() + '-min'"
          type="number"
          [value]="value().min"
          (input)="updateMin($event)"
          (blur)="onTouched()"
          class="ch-range-filter__input"
          [attr.data-testid]="testId() + '-min'"
          placeholder="0"
        />
      </div>
      <div class="ch-range-filter__field">
        <label [for]="testId() + '-max'" class="ch-range-filter__label">{{
          t('max')
        }}</label>
        <input
          [id]="testId() + '-max'"
          type="number"
          [value]="value().max"
          (input)="updateMax($event)"
          (blur)="onTouched()"
          class="ch-range-filter__input"
          [attr.data-testid]="testId() + '-max'"
          placeholder="100"
        />
      </div>
    </div>
  </div>
</div>
