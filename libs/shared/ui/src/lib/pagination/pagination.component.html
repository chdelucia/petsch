<div class="pagination">
  <button
    class="pagination__button"
    [disabled]="!links().first"
    (click)="emitUrl(links().first)"
  >
    &laquo;
  </button>
  <button
    class="pagination__button"
    [disabled]="!links().prev"
    (click)="emitUrl(links().prev)"
  >
    &lsaquo;
  </button>

  <span class="pagination__info">
    Page {{ page() }} of {{ totalPages() }}
  </span>

  <button
    class="pagination__button"
    [disabled]="!links().next"
    (click)="emitUrl(links().next)"
  >
    &rsaquo;
  </button>
  <button
    class="pagination__button"
    [disabled]="!links().last"
    (click)="emitUrl(links().last)"
  >
    &raquo;
  </button>
</div>
