@let pageI = page();
@let total = totalPages();

<ul
  class="ch-pagination"
  aria-label="Pagination"
  *transloco="let t"
  [attr.data-testid]="testId()"
>
  <li
    class="ch-page-item ch-xs-hide"
    [ngClass]="{ 'ch-disabled': pageI === 1 }"
  >
    <lib-ch-ui-button
      variant="outline"
      (clicked)="emitPage(1)"
      [disabled]="pageI === 1"
      [testId]="testId() + '-first'"
    >
      {{ t('first') }}
    </lib-ch-ui-button>
  </li>
  <li class="ch-page-item" [ngClass]="{ 'ch-disabled': pageI === 1 }">
    <lib-ch-ui-button
      variant="outline"
      (clicked)="emitPage(pageI - 1)"
      [disabled]="pageI === 1"
      [testId]="testId() + '-prev'"
    >
      {{ t('prev') }}
    </lib-ch-ui-button>
  </li>
  <li class="ch-page-item ch-active" aria-current="page">
    <lib-ch-ui-button
      variant="outline"
      [isActive]="true"
      [testId]="testId() + '-number'"
    >
      {{ page() }} {{ t('of') }} {{ total }}
    </lib-ch-ui-button>
  </li>
  <li class="ch-page-item" [ngClass]="{ 'ch-disabled': pageI === total }">
    <lib-ch-ui-button
      variant="outline"
      (clicked)="emitPage(pageI + 1)"
      [disabled]="pageI === total"
      [testId]="testId() + '-next'"
    >
      {{ t('next') }}
    </lib-ch-ui-button>
  </li>
  <li
    class="ch-page-item ch-xs-hide"
    [ngClass]="{ 'ch-disabled': pageI === total }"
  >
    <lib-ch-ui-button
      variant="outline"
      (clicked)="emitPage(total)"
      [disabled]="pageI === total"
      [testId]="testId() + '-last'"
    >
      {{ t('last') }}
    </lib-ch-ui-button>
  </li>
</ul>
