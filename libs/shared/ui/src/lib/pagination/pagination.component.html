@let pageI = page();
@let total = totalPages();

<ul class="pagination" aria-label="Pagination">
  <li class="page-item xs-hide" [ngClass]="{ disabled: pageI === 1 }">
    <button
      class="page-link"
      (click)="emitPage(1)"
      data-cy="p-first"
      [disabled]="pageI === 1"
    >
      First
    </button>
  </li>
  <li class="page-item" [ngClass]="{ disabled: pageI === 1 }">
    <button
      class="page-link"
      (click)="emitPage(pageI - 1)"
      data-cy="p-prev"
      [disabled]="pageI === 1"
    >
      Prev
    </button>
  </li>
  <li class="page-item active" aria-current="page">
    <button class="page-link" data-cy="p-number">
      {{ page() }} of {{ total }}
    </button>
  </li>
  <li class="page-item" [ngClass]="{ disabled: pageI === total }">
    <button
      class="page-link"
      (click)="emitPage(pageI + 1)"
      data-cy="p-next"
      [disabled]="pageI === total"
    >
      Next
    </button>
  </li>
  <li class="page-item xs-hide" [ngClass]="{ disabled: pageI === total }">
    <button
      class="page-link"
      (click)="emitPage(total)"
      data-cy="p-last"
      [disabled]="pageI === total"
    >
      Last
    </button>
  </li>
</ul>
