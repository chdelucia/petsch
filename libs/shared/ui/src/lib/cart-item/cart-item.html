<div class="ch-cart-item" *transloco="let t" [attr.data-testid]="testId()">
  <div class="ch-cart-item__img-container">
    <img [src]="imageSrc()" [alt]="name()" class="ch-cart-item__img" />
  </div>

  <div class="ch-cart-item__content">
    <div class="ch-cart-item__header">
      <h3>{{ name() }}</h3>
    </div>

    <p class="ch-cart-item__date">{{ day() }}</p>
    <p class="ch-cart-item__desc">{{ description() }}</p>

    @if (showRemove()) {
    <div class="ch-cart-item__footer">
      <button
        type="button"
        class="ch-cart-item__remove"
        (click)="handleRemove()"
        [attr.aria-label]="t('remove')"
        [attr.data-testid]="testId() + '-remove'"
      >
        {{ t('remove') }}
      </button>
    </div>
    }
  </div>
</div>
