<div
  class="ch-cart-drawer-overlay"
  [class.ch-cart-drawer-overlay--open]="open()"
  (click)="closeDrawer()"
  (keydown)="closeDrawer()"
  role="button"
  tabindex="-1"
  aria-hidden="true"
></div>

<div
  class="ch-cart-drawer-container"
  *transloco="let t"
  [attr.data-testid]="testId()"
  [class.ch-cart-drawer-container--open]="open()"
>
  <div class="ch-cart-drawer-inner">
    <div
      class="ch-cart-drawer-panel-container"
      [class.ch-cart-drawer-panel-container--left]="position() === 'left'"
      [class.ch-cart-drawer-panel-container--right]="position() === 'right'"
    >
      <div
        class="ch-cart-drawer-panel"
        [class.ch-cart-drawer-panel--open]="open()"
        [class.ch-cart-drawer-panel--left]="position() === 'left'"
        [class.ch-cart-drawer-panel--right]="position() === 'right'"
      >
        <div class="ch-cart-drawer-content">
          <div class="ch-cart-drawer-body">
            <div class="ch-cart-drawer-header">
              <h2 class="ch-cart-drawer-title">{{ titleLabel() }}</h2>
              <lib-ch-ui-button
                variant="ghost"
                size="sm"
                (clicked)="closeDrawer()"
                [ariaLabel]="t('close')"
                [testId]="testId() + '-close'"
              >
                ✕
              </lib-ch-ui-button>
            </div>
            <ng-content></ng-content>
          </div>

          @if (showFooter()) {
          <lib-ch-ui-cart-footer
            [closeLabel]="closeLabel()"
            (closeDrawer)="closeDrawer()"
          ></lib-ch-ui-cart-footer>
          }
        </div>
      </div>
    </div>
  </div>
</div>
