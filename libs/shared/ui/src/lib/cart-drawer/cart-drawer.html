@if (open()) {
<div class="fixed inset-0 bg-gray-500/75 transition-opacity duration-500"></div>
}

<div class="fixed inset-0 overflow-hidden">
  <div class="absolute inset-0 overflow-hidden">
    <div
      class="pointer-events-none fixed inset-y-0 right-0 flex max-w-full pl-10 sm:pl-16"
    >
      <div
        class="pointer-events-auto w-screen max-w-md transform transition-transform duration-500 ease-in-out"
        [class.translate-x-full]="!open()"
      >
        <div class="flex h-full flex-col overflow-y-auto bg-white shadow-xl">
          <div class="flex-1 overflow-y-auto px-4 py-6 sm:px-6">
            <div class="flex items-start justify-between">
              <h2 class="text-lg font-medium text-gray-900">Shopping Cart</h2>
              <button
                type="button"
                class="ml-3 h-7 w-7 text-gray-400 hover:text-gray-500 cursor-pointer"
                (click)="closeDrawer()"
              >
                ✕
              </button>
            </div>

            <lib-ui-cart-list>
              <ng-content></ng-content>
            </lib-ui-cart-list>
          </div>

          <lib-ui-cart-footer
            [subtotal]="subtotal()"
            (checkout)="checkout()"
            (closeDrawer)="closeDrawer()"
          ></lib-ui-cart-footer>
        </div>
      </div>
    </div>
  </div>
</div>
