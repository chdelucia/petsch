<div class="border-t px-4 py-6 sm:px-6">
  <div class="flex justify-between text-base font-medium text-gray-900">
    <p>Subtotal</p>
    <p>{{ subtotal() }} €</p>
  </div>

  <div class="mt-6">
    <lib-ui-button
      variant="primary"
      [fullWidth]="true"
      (clicked)="checkout.emit()"
    >
      Checkout
    </lib-ui-button>
  </div>

  <div class="mt-6 text-center text-sm text-gray-500">
    <lib-ui-button variant="link" (clicked)="closeDrawer.emit()">
      Continue Shopping →
    </lib-ui-button>
  </div>
</div>
