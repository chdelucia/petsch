<ul class="divide-y divide-gray-100">
  @for (item of products(); track item.id) {
  <lib-ui-product-list-item
    [id]="item.id"
    [name]="item.name"
    [title]="item.title"
    [description]="item.description"
    [price]="item.price"
    [imageUrl]="item.imageUrl"
    [creationAt]="item.creationAt"
  ></lib-ui-product-list-item>
  }
</ul>
