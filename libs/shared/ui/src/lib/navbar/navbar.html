<header class="ch-navbar" *transloco="let t">
  <nav class="ch-navbar__container">
    <div class="ch-navbar__main">
      <div class="ch-navbar__brand">
        <a href="/" class="ch-navbar__logo">
          <span class="sr-only">CH Apps</span>
          <svg class="h-8 w-auto text-primary-600" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
          </svg>
        </a>
      </div>

      <!-- Desktop Menu -->
      <div class="ch-navbar__desktop-links">
        @for (app of apps; track app.id) {
        <a
          [href]="app.url"
          class="ch-navbar__link"
          [class.ch-navbar__link--active]="currentApp() === app.id"
        >
          {{ t(app.name) }}
        </a>
        }
      </div>

      <div class="ch-navbar__actions">
        <div class="ch-navbar__lang-switcher">
          <ng-content></ng-content>
        </div>

        <!-- Mobile Menu Button -->
        <div class="ch-navbar__mobile-menu-button">
          <lib-ch-ui-button
            variant="ghost"
            size="sm"
            (clicked)="toggleMenu()"
            [ariaExpanded]="isMenuOpen()"
            ariaControls="mobile-menu"
          >
            <span class="sr-only">Open main menu</span>
            @if (!isMenuOpen()) {
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
            } @else {
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
            }
          </lib-ch-ui-button>
        </div>
      </div>
    </div>

    <!-- Mobile Menu -->
    @if (isMenuOpen()) {
    <div class="ch-navbar__mobile-links" id="mobile-menu">
      @for (app of apps; track app.id) {
      <a
        [href]="app.url"
        class="ch-navbar__mobile-link"
        [class.ch-navbar__mobile-link--active]="currentApp() === app.id"
      >
        {{ t(app.name) }}
      </a>
      }
    </div>
    }
  </nav>
</header>
