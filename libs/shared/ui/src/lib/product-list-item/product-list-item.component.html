<li
  class="product-list-item"
  [routerLink]="['details', id()]"
>
  <div class="product-list-item__main">
    <img
      class="product-list-item__img"
      [src]="imageUrl()"
      [alt]="name()"
    />
    <div class="product-list-item__info">
      <p class="product-list-item__title">
        {{ title() }}
      </p>
      <p class="product-list-item__desc">
        {{ description() }}
      </p>
    </div>
  </div>
  <div class="product-list-item__side">
    <p class="product-list-item__name">{{ name() }}</p>
    <p class="product-list-item__meta">
      Create at {{ creationAt() | date: 'medium' }}<br />
      <b>{{ price() }}€</b>
    </p>
  </div>
</li>
