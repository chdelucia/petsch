<section class="skeleton-header">
  <div class="skeleton-header__bar"></div>
</section>
<div class="skeleton-grid">
  @for (number of [1, 2, 3, 4, 5, 6, 7, 8]; track $index) {
    <div class="skeleton-card">
      <div class="skeleton-card__img"></div>
      <div class="skeleton-card__content">
        <div class="skeleton-card__title"></div>
        <div class="skeleton-card__desc"></div>
      </div>
    </div>
  }
</div>
