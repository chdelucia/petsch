<div class="ch-skeleton-grid">
  @for (number of [1, 2, 3, 4, 5, 6, 7, 8]; track $index) {
    <div class="ch-skeleton-card">
      <div class="ch-skeleton-card__img"></div>
      <div class="ch-skeleton-card__content">
        <div class="ch-skeleton-card__title"></div>
        <div class="ch-skeleton-card__desc"></div>
      </div>
    </div>
  }
</div>
