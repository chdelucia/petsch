<form [formGroup]="form">
  <lib-product-active-filters
    [values]="store.filtersApplied()"
    (resetFilter)="resetFilter($event)"
  >
  </lib-product-active-filters>

  <lib-ui-input-filter
    title="name"
    formControlName="name"
  ></lib-ui-input-filter>

  <lib-ui-radio-filter
    title="kind"
    [options]="genderOptions"
    formControlName="kind"
  ></lib-ui-radio-filter>
</form>
