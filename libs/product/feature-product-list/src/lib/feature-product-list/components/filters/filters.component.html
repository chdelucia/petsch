<form [formRoot]="form">
  <lib-product-active-filters
    [values]="store.filtersApplied()"
    (resetFilter)="resetFilter($event)"
  >
  </lib-product-active-filters>

  <lib-ui-input-filter
    title="name"
    [formField]="form.name"
  ></lib-ui-input-filter>
  <lib-ui-radio-filter
    title="Status"
    [options]="statusOptions"
    [formField]="form.status"
  ></lib-ui-radio-filter>
  <lib-ui-radio-filter
    title="gender"
    [options]="genderOptions"
    [formField]="form.gender"
  ></lib-ui-radio-filter>
  <lib-ui-radio-filter
    title="species"
    [options]="speciesOptions"
    [formField]="form.species"
  ></lib-ui-radio-filter>
</form>
