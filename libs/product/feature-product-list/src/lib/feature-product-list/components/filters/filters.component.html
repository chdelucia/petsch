<form [formGroup]="form" *transloco="let t">
  <lib-product-active-filters
    [values]="store.filtersApplied()"
    (resetFilter)="resetFilter($event)"
  >
  </lib-product-active-filters>

  <lib-ui-input-filter
    [title]="t('name')"
    formControlName="name"
  ></lib-ui-input-filter>

  <lib-ui-radio-filter
    [title]="t('kind')"
    [options]="genderOptions"
    formControlName="kind"
  ></lib-ui-radio-filter>
</form>
