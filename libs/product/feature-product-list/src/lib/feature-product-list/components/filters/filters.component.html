<form [formGroup]="form" *transloco="let t">
  <lib-product-active-filters
    [values]="activeFilters"
    (resetFilter)="resetFilter($event)"
  >
  </lib-product-active-filters>

  @for (config of filterConfigs; track config.key) {
    @if (config.type === 'input') {
      <lib-ui-input-filter
        [title]="t(config.key)"
        [formControlName]="config.key"
      ></lib-ui-input-filter>
    }

    @if (config.type === 'radio') {
      <lib-ui-radio-filter
        [title]="t(config.key)"
        [options]="config.options"
        [formControlName]="config.key"
      ></lib-ui-radio-filter>
    }
  }
</form>
