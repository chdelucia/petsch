@if (activeFilters()) {
  <section class="active-filters">
    <h3 class="active-filters__title">
      Active filters
    </h3>
    <div class="active-filters__list">
      @for (item of values() | keyvalue; track $index) {
        @if (item.key !== 'page' && item.value) {
          <div
            class="active-filters__item"
          >
            <div class="active-filters__label">
              <small>{{ item.key }}: </small>{{ item.value }}
            </div>
            <button
              type="button"
              [attr.data-cy]="'clear-filter-' + item.key"
              class="active-filters__remove"
              (click)="deleteFilter(item.key)"
            >
              <span class="active-filters__sr">Close</span>
              <svg
                class="active-filters__remove-icon"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                aria-hidden="true"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M6 18L18 6M6 6l12 12"
                />
              </svg>
            </button>
          </div>
        }
      }
    </div>
  </section>
}
