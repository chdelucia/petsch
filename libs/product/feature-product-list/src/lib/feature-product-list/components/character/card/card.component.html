<div class="group relative container__car">
  <div
    class="container__card__img aspect-h-1 aspect-w-1 w-full overflow-hidden rounded-md bg-gray-200 lg:aspect-none lg:h-80"
  >
    <img
      [src]="item().images[0]"
      [alt]="item().name"
      [style.viewTransitionName]="viewTransitionName(item())"
      class="h-full w-full object-cover object-center lg:h-full lg:w-full group-hover:opacity-75"
    />
  </div>
  <div class="mt-2 flex justify-between">
    <div class="overflow-hidden pb-2">
      <h3 class="text-2xl truncate text-gray-700 mb-3">
        <a [routerLink]="['/list/details', item().id]" [state]="item()">
          <span
            aria-hidden="true"
            class="absolute inset-0 container__card__name"
          ></span>
          {{ item().title }}
        </a>
      </h3>
      <div class="flex justify-between">
        <span>{{ item().category['name'] }}</span>
        <span>{{ item().price }} €</span>
      </div>
    </div>
  </div>
</div>
