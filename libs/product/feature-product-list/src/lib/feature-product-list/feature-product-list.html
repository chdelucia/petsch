<lib-ui-product-list-header
  title="Productos"
  [gridView]="gridView()"
  [showFilters]="showFilters()"
  (toggleView)="toggleView()"
  (toggleFilters)="toggleFilters()"
></lib-ui-product-list-header>

<section aria-labelledby="products-heading" class="chars">
  <div class="chars__grid">
    <lib-product-filters
      class="chars__filters"
      [class.hidden]="!showFilters()"
    ></lib-product-filters>

    <div class="chars__list" [class.no-filters]="!showFilters()">
      @defer(when !loading()) {
      <div class="chars__list__pagination-container">
        <lib-ui-pagination
          class="chars__list__pagination"
          [page]="store.currentPage()"
          [totalPages]="store.totalPages()"
          [links]="store.pagination()"
          (urlChange)="handleUrlChange($event)"
        ></lib-ui-pagination>

        <lib-ui-select
          [label]="'Items per page'"
          [options]="limitOptions"
          [ngModel]="store.filtersApplied()._limit || 5"
          (ngModelChange)="handleLimitChange($event)"
        ></lib-ui-select>
      </div>

      @if (gridView()) {
      <section class="char-grid" [class.no-filters]="!showFilters()">
        @for (item of products(); track item.id) {
        <lib-ui-product-card
          class="card-effect"
          [id]="item.id"
          [name]="item.name"
          [imageUrl]="item.photo_url"
          [categoryName]="item.kind"
          [viewTransitionName]="transitionService.getViewTransitionName(item.id)"
        >
        </lib-ui-product-card>
        }
      </section>
      } @else {
      <lib-ui-product-list-view
        [products]="uiProducts()"
      ></lib-ui-product-list-view>
      } } @placeholder(minimum 1000ms) {
      <lib-ui-product-card-skeleton></lib-ui-product-card-skeleton>
      }
    </div>
  </div>
</section>
