<lib-ui-product-list-header
  text="Productos"
  [gridView]="gridView()"
  [showFilters]="showFilters()"
  (toggleView)="toggleView()"
  (toggleFilters)="toggleFilters()"
>
</lib-ui-product-list-header>

<div class="potd-actions">
  <lib-ui-button (clicked)="togglePotdDrawer()">Ver mascotas del día</lib-ui-button>
</div>

<section aria-labelledby="products-heading" class="chars">
  <div class="chars__grid">
    <lib-product-filters
      class="chars__filters"
      [class.chars__filters--hidden]="!showFilters()"
    ></lib-product-filters>

    <div class="chars__list" [class.chars__list--no-filters]="!showFilters()">
      @if (!loading()) {
      <lib-ui-pagination
        class="chars__list__pagination"
        [page]="currentPage()"
        [totalPages]="totalPages()"
        (pageChange)="handlePageChange($event)"
      ></lib-ui-pagination>

      <section class="char-grid" [class.char-grid--no-filters]="!showFilters()">
        @for (item of products(); track item.id) {
        <lib-ui-product-card
          class="card-effect"
          [id]="item.id"
          [name]="item.name"
          [imageUrl]="item.photo_url"
          [categoryName]="item.kind"
          [status]="item.health"
          [viewTransitionName]="transitionService.getViewTransitionName(item.id)"
          [buttonText]="getButtonText()"
          (buttonClick)="handlePotdClick(item)"
        >
        </lib-ui-product-card>
        }
      </section>
      } @else {
      <lib-ui-product-card-skeleton></lib-ui-product-card-skeleton>
      }
    </div>
  </div>
</section>

<lib-ui-cart-drawer
  [open]="showPotdDrawer()"
  (openChange)="showPotdDrawer.set($event)"
  title="Mascotas del día"
  [subtotal]="0"
  [showSubtotal]="false"
  checkoutLabel="Cerrar"
  closeLabel="Seguir navegando"
  (checkoutClick)="showPotdDrawer.set(false)"
>
  @for (entry of potdStore.sortedEntries(); track entry.date) {
    <li>
      <lib-ui-cart-item
        [imageSrc]="entry.pet.photo_url"
        [imageAlt]="entry.pet.name"
        [name]="entry.pet.name"
        [price]="0"
        [color]="entry.date"
        [quantity]="1"
      ></lib-ui-cart-item>
    </li>
  }
</lib-ui-cart-drawer>
