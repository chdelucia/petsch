<ng-container *transloco="let t">
  <div>
    @if(error()) {
    <div>Algo fue mal: {{error()}}</div>
    } @else if (!loading()) {
    <lib-ch-ui-pagination
      class="chars__list__pagination"
      [page]="currentPage()"
      [totalPages]="totalPages()"
      (pageChange)="handlePageChange($event)"
    ></lib-ch-ui-pagination>

    <section class="char-grid" [class.char-grid--no-filters]="!showFilters()">
      @for (item of products(); track item.id; let first = $first) {
      <lib-ch-ui-card
        class="card-effect"
        [id]="item.id"
        [name]="item.name"
        [imageUrl]="item.photo_url"
        [viewTransitionName]="transitionService.getViewTransitionName(item.id)"
        [priority]="first"
      >
        <div info>
          <p>{{ item.kind }} {{ item.health }}</p>
          <p>{{ item.height }}cm {{item.length}}cm {{ item.weight }}g</p>
        </div>

        <lib-ch-ui-button [fullWidth]="true" (clicked)="handlePotdClick(item)"
          >{{t(getButtonText())}}</lib-ch-ui-button
        >
        >
      </lib-ch-ui-card>
      }
    </section>
    } @else {
    <lib-ch-ui-card-skeleton></lib-ch-ui-card-skeleton>
    }
  </div>
</ng-container>
