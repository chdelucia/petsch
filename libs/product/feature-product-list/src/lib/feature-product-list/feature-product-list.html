<lib-ui-product-list-header
  text="Productos"
  [gridView]="gridView()"
  [showFilters]="showFilters()"
  (toggleView)="toggleView()"
  (toggleFilters)="toggleFilters()"
></lib-ui-product-list-header>

<section aria-labelledby="products-heading" class="chars">
  <div class="chars__grid">
    <lib-product-filters
      class="chars__filters"
      [class.chars__filters--hidden]="!showFilters()"
    ></lib-product-filters>

    <div class="chars__list" [class.chars__list--no-filters]="!showFilters()">
      @if (!loading()) {
      <lib-ui-pagination
        class="chars__list__pagination"
        [page]="currentPage()"
        [totalPages]="totalPages()"
        (pageChange)="handlePageChange($event)"
      ></lib-ui-pagination>

      <section class="char-grid" [class.char-grid--no-filters]="!showFilters()">
        @for (item of products(); track item.id) {
        <lib-ui-card
          class="card-effect"
          [id]="item.id"
          [name]="item.name"
          [imageUrl]="item.photo_url"
          [viewTransitionName]="transitionService.getViewTransitionName(item.id)"
        >
          <div info>
            <p>{{ item.kind }} {{ item.health }}</p>
            <p>{{ item.height }}cm {{item.length}}cm {{ item.weight }}g</p>
          </div>
          <lib-ui-button [fullWidth]="true" (clicked)="open.set(true)"
            >Add as 'Pet of the day'</lib-ui-button
          >
        </lib-ui-card>
        }
      </section>
      } @else {
      <lib-ui-card-skeleton></lib-ui-card-skeleton>
      }
    </div>
  </div>
</section>

<lib-ui-cart-drawer
  [open]="open()"
  (openChange)="open.set($event)"
  [subtotal]="200"
>
  <li>Item 1</li>
  <li>Item 2</li>
</lib-ui-cart-drawer>
