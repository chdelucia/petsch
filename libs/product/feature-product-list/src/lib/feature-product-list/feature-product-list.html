<section class="top-container">
  <div class="text-2xl">Productos</div>

  <div class="top-container__filters">
    <button (click)="toggleView()">
      <span class="sr-only">View grid</span>
      <svg
        class="top-container__filters__toggleview"
        [class.active]="gridView()"
        aria-hidden="true"
        viewBox="0 0 20 20"
        fill="currentColor"
      >
        <path
          fill-rule="evenodd"
          d="M4.25 2A2.25 2.25 0 002 4.25v2.5A2.25 2.25 0 004.25 9h2.5A2.25 2.25 0 009 6.75v-2.5A2.25 2.25 0 006.75 2h-2.5zm0 9A2.25 2.25 0 002 13.25v2.5A2.25 2.25 0 004.25 18h2.5A2.25 2.25 0 009 15.75v-2.5A2.25 2.25 0 006.75 11h-2.5zm9-9A2.25 2.25 0 0011 4.25v2.5A2.25 2.25 0 0013.25 9h2.5A2.25 2.25 0 0018 6.75v-2.5A2.25 2.25 0 0015.75 2h-2.5zm0 9A2.25 2.25 0 0011 13.25v2.5A2.25 2.25 0 0013.25 18h2.5A2.25 2.25 0 0018 15.75v-2.5A2.25 2.25 0 0015.75 11h-2.5z"
          clip-rule="evenodd"
        />
      </svg>
    </button>

    <button (click)="toggleFilters()">
      <span class="sr-only">Filters</span>
      <svg
        class="top-container__filters__togglefilters"
        [class.active]="showFilters()"
        aria-hidden="true"
        viewBox="0 0 20 20"
        fill="currentColor"
      >
        <path
          fill-rule="evenodd"
          d="M2.628 1.601C5.028 1.206 7.49 1 10 1s4.973.206 7.372.601a.75.75 0 01.628.74v2.288a2.25 2.25 0 01-.659 1.59l-4.682 4.683a2.25 2.25 0 00-.659 1.59v3.037c0 .684-.31 1.33-.844 1.757l-1.937 1.55A.75.75 0 018 18.25v-5.757a2.25 2.25 0 00-.659-1.591L2.659 6.22A2.25 2.25 0 012 4.629V2.34a.75.75 0 01.628-.74z"
          clip-rule="evenodd"
        />
      </svg>
    </button>
  </div>
</section>

<section aria-labelledby="products-heading" class="chars">
  <div class="chars__grid">
    <lib-product-filters
      class="chars__filters"
      [class.hidden]="!showFilters()"
    ></lib-product-filters>

    <div class="chars__list" [class.no-filters]="!showFilters()">
      @defer(when !loading()) {
      <lib-ui-pagination
        class="chars__list__pagination"
        [page]="1"
        [totalPages]="10"
        (pageChange)="handlePageChange($event)"
      ></lib-ui-pagination>

      @if (gridView()) {
      <section class="char-grid" [class.no-filters]="!showFilters()">
        @for (item of products(); track item.id) {
        <lib-product-card class="card-effect" [item]="item"> </lib-product-card>
        }
      </section>
      } @else {
      <lib-product-list-view [characters]="products()"></lib-product-list-view>
      } } @placeholder(minimum 1500ms) {
      <lib-product-card-skeleton></lib-product-card-skeleton>
      }
    </div>
  </div>
</section>
