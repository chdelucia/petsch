# ────────── Project identification ──────────
sonar.projectKey=chdelucia_petsch
sonar.organization=chdelucia
sonar.projectName=petsch
sonar.projectVersion=1.0

# ────────── Source code settings ──────────
# Analiza automáticamente todas las carpetas de src y libs, excluyendo utilidades/experimentales
sonar.sources=apps,libs
sonar.sourceEncoding=UTF-8

# ────────── Test configuration ──────────
# Detecta automáticamente todos los tests .spec.ts
sonar.tests=apps,libs
sonar.test.inclusions=**/*.spec.ts

# ────────── Exclusions ──────────
# Archivos/carpetas no relevantes para análisis
sonar.exclusions=\
**/node_modules/**,\
**/.vscode/**,\
**/dist/**,\
**/*.config.ts,\
**/main.ts,\
**/*routes.ts,\
**/*test-setup.ts,\
**/*.const.ts,\
libs/shared/util/**,\
libs/shared/ui/**,\

# Excluir archivos irrelevantes de cobertura
sonar.coverage.exclusions=\
**/*.stories.ts,\
**/*.interface.ts,\
**/*.model.ts,\
libs/shared/util/**,\
libs/shared/ui/**,\

# ────────── Coverage reports ──────────
# Detecta automáticamente todos los lcov.info en el proyecto
sonar.typescript.lcov.reportPaths=coverage/petshop/lcov.info,coverage/libs/**/lcov.info
