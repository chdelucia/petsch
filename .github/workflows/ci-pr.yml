name: PR CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    if: false
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      base: ${{ steps.compute_base.outputs.base }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Fetch all branches
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*'

      - uses: oven-sh/setup-bun@v2

      - name: Compute NX base
        id: compute_base
        run: |
          if [ -n "${GITHUB_EVENT_PULL_REQUEST_BASE_REF}" ]; then
            BASE=origin/${GITHUB_EVENT_PULL_REQUEST_BASE_REF}
            if ! git rev-parse --verify "$BASE" >/dev/null 2>&1; then
              BASE=$(git rev-list --max-parents=0 HEAD)
            fi
          else
            BASE=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "base=$BASE" >> $GITHUB_OUTPUT
        env:
          GITHUB_EVENT_PULL_REQUEST_BASE_REF: ${{ github.event.pull_request.base.ref }}

      - name: Validate commits
        run: |
          bun add @commitlint/{cli,config-conventional}
          bun x commitlint --from=${{ steps.compute_base.outputs.base }} --to=HEAD

  install:
    if: false
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Fetch all branches
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*'

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

  lint:
    if: false
    runs-on: ubuntu-latest
    needs: [install, validate]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Fetch all branches
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*'

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile
      - run: bun x nx affected -t lint --base=${{ needs.validate.outputs.base }} --parallel

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Fetch all branches
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*'

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile
      - run: bun x nx run-many -t test --coverage --coverageReporters=lcov --parallel
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 1

  sonar:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage
          path: coverage/
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  e2e:
    if: false
    runs-on: ubuntu-latest
    needs: [install, validate]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
      - name: Fetch all branches
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*'
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile
      - name: Install playwright
        run: bun x playwright install --with-deps
      - name: Run E2E (affected)
        run: bun x nx affected -t e2e --base=${{ needs.validate.outputs.base }}

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Fetch all branches
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*'

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile
      - name: Build production (Vercel script)
        run: bun nx build petshop
