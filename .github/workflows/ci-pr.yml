name: PR CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      base: ${{ steps.compute_base.outputs.base }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Fetch all branches
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*'

      - uses: oven-sh/setup-bun@v2

      - name: Compute NX base
        id: compute_base
        run: |
          if [ -n "${GITHUB_EVENT_PULL_REQUEST_BASE_REF}" ]; then
            BASE=origin/${GITHUB_EVENT_PULL_REQUEST_BASE_REF}
            if ! git rev-parse --verify "$BASE" >/dev/null 2>&1; then
              BASE=$(git rev-list --max-parents=0 HEAD)
            fi
          else
            BASE=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "base=$BASE" >> $GITHUB_OUTPUT
        env:
          GITHUB_EVENT_PULL_REQUEST_BASE_REF: ${{ github.event.pull_request.base.ref }}

      - name: Validate commits
        run: |
          bun add @commitlint/{cli,config-conventional}
          bun x commitlint --from=${{ steps.compute_base.outputs.base }} --to=HEAD

  install:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Fetch all branches
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*'

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Cypress
        run: bun x cypress install

  lint:
    runs-on: ubuntu-latest
    needs: [install, validate]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Fetch all branches
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*'

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile
      - run: bun x nx affected -t lint --base=${{ needs.validate.outputs.base }} --parallel

  test:
    runs-on: ubuntu-latest
    needs: [install, validate]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Fetch all branches
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*'

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile
      - run: bun x nx affected -t test --coverage --coverageReporters=lcov --parallel --base=${{ needs.validate.outputs.base }}
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 1

  sonar:
    runs-on: ubuntu-latest
    needs: [test, validate]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage/
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: [install, validate]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Fetch all branches
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*'

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile
      - name: Build production (Vercel script)
        run: bun nx build petshop

  e2e:
    runs-on: ubuntu-latest
    needs: [build, validate]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(bun x playwright --version | awk '{print $3}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bun x playwright install --with-deps

      - name: Serve app
        run: npx serve dist/apps/petshop/browser -l 4200 &

      - name: Wait for server
        run: npx wait-on http://localhost:4200

      - name: Run E2E
        run: CI=true BASE_URL=http://localhost:4200 bun x nx affected -t e2e --base=${{ needs.validate.outputs.base }} --baseUrl=http://localhost:4200
